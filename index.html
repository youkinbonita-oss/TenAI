<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TenAI Chat</title>
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    height: 100%;
    background: #212121;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden;
  }

  #layout {
    display: flex;
    height: 100vh;
    height: 100dvh;
    width: 100%;
  }

  /* Sidebar */
  #sidebar {
    width: 260px;
    flex-shrink: 0;
    background: #171717;
    display: flex;
    flex-direction: column;
    border-right: 1px solid #2f2f2f;
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;
    transform: translateX(-100%);
    transition: transform 0.2s ease;
    z-index: 30;
  }

  #sidebar.open {
    transform: translateX(0);
  }

  #sidebar-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 20;
  }

  #sidebar-backdrop.open {
    display: block;
  }

  #new-chat-btn {
    margin: 12px;
    background: #2f6fed;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #new-chat-btn:hover {
    background: #2660d1;
  }

  #conversation-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 8px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  #conversation-list::-webkit-scrollbar {
    width: 6px;
  }
  #conversation-list::-webkit-scrollbar-thumb {
    background: #3d3d3d;
    border-radius: 4px;
  }

  .conversation-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 8px 10px 12px;
    border-radius: 8px;
    color: #d4d4d4;
    font-size: 14px;
    cursor: pointer;
  }

  .conversation-item:hover {
    background: #2a2a2a;
  }

  .conversation-item.active {
    background: #2f2f2f;
    color: #fff;
  }

  .conversation-title {
    flex: 1;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .conversation-title-input {
    flex: 1;
    min-width: 0;
    background: #1f1f1f;
    border: 1px solid #4a4a4a;
    color: #fff;
    font-size: 14px;
    font-family: inherit;
    border-radius: 6px;
    padding: 4px 6px;
    outline: none;
  }

  .conv-actions {
    display: flex;
    gap: 2px;
    flex-shrink: 0;
  }

  .conv-action-btn {
    background: none;
    border: none;
    color: #9b9b9b;
    cursor: pointer;
    padding: 4px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .conv-action-btn:hover {
    background: #3d3d3d;
    color: #fff;
  }

  .conv-action-btn svg {
    width: 15px;
    height: 15px;
  }

  /* Main area */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100%;
    min-width: 0;
  }

  header {
    padding: 14px 16px;
    border-bottom: 1px solid #2f2f2f;
    color: #ececec;
    font-size: 17px;
    font-weight: 600;
    flex-shrink: 0;
    background: #212121;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  #menu-btn {
    background: none;
    border: none;
    color: #ececec;
    cursor: pointer;
    padding: 4px;
    display: flex;
    align-items: center;
  }

  #menu-btn svg {
    width: 22px;
    height: 22px;
  }

  #chat-window {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  #chat-window::-webkit-scrollbar {
    width: 8px;
  }
  #chat-window::-webkit-scrollbar-thumb {
    background: #444;
    border-radius: 4px;
  }
  #chat-window::-webkit-scrollbar-track {
    background: transparent;
  }

  .message-row {
    display: flex;
    width: 100%;
  }

  .message-row.user {
    justify-content: flex-end;
  }

  .message-row.ai {
    justify-content: flex-start;
  }

  .bubble {
    max-width: 75%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .message-row.user .bubble {
    background: #2f6fed;
    color: #ffffff;
    border-bottom-right-radius: 4px;
  }

  .message-row.ai .bubble {
    background: #2f2f2f;
    color: #ececec;
    border-bottom-left-radius: 4px;
  }

  .bubble.thinking {
    color: #9b9b9b;
    font-style: italic;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .dot {
    width: 6px;
    height: 6px;
    background: #9b9b9b;
    border-radius: 50%;
    animation: blink 1.4s infinite both;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; }
    40% { opacity: 1; }
  }

  #input-area {
    flex-shrink: 0;
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    border-top: 1px solid #2f2f2f;
    background: #212121;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  #image-preview-bar {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 0 4px;
  }

  #image-preview-bar.visible {
    display: flex;
  }

  #image-preview-thumb {
    position: relative;
    width: 56px;
    height: 56px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid #3d3d3d;
  }

  #image-preview-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  #remove-image-btn {
    position: absolute;
    top: -6px;
    right: -6px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #3d3d3d;
    color: #fff;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    line-height: 1;
  }

  #remove-image-btn:hover {
    background: #555;
  }

  #input-row {
    display: flex;
    align-items: flex-end;
    gap: 10px;
  }

  #attach-btn {
    flex-shrink: 0;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: none;
    background: #2f2f2f;
    color: #d4d4d4;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #attach-btn:hover {
    background: #3d3d3d;
  }

  #attach-btn svg {
    width: 20px;
    height: 20px;
  }

  #mic-btn {
    flex-shrink: 0;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: none;
    background: #2f2f2f;
    color: #d4d4d4;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease, color 0.15s ease;
  }

  #mic-btn:hover {
    background: #3d3d3d;
  }

  #mic-btn.recording {
    background: #e5484d;
    color: #fff;
    animation: mic-pulse 1.4s infinite;
  }

  #mic-btn svg {
    width: 20px;
    height: 20px;
  }

  #mic-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  @keyframes mic-pulse {
    0% { box-shadow: 0 0 0 0 rgba(229, 72, 77, 0.5); }
    70% { box-shadow: 0 0 0 10px rgba(229, 72, 77, 0); }
    100% { box-shadow: 0 0 0 0 rgba(229, 72, 77, 0); }
  }

  .bubble-image {
    max-width: 100%;
    max-height: 260px;
    border-radius: 12px;
    display: block;
    margin-bottom: 6px;
    object-fit: cover;
    cursor: pointer;
  }

  /* Lightbox */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.92);
    z-index: 100;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    touch-action: none;
  }

  #lightbox.open {
    display: flex;
  }

  #lightbox-img {
    max-width: 92vw;
    max-height: 92vh;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    will-change: transform;
    transform-origin: center center;
  }

  #lightbox-close {
    position: fixed;
    top: max(16px, env(safe-area-inset-top));
    right: 16px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.12);
    border: none;
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 101;
  }

  #lightbox-close:hover {
    background: rgba(255, 255, 255, 0.22);
  }

  #lightbox-close svg {
    width: 22px;
    height: 22px;
  }

  #message-input {
    flex: 1;
    resize: none;
    max-height: 140px;
    min-height: 44px;
    padding: 12px 14px;
    border-radius: 22px;
    border: 1px solid #3d3d3d;
    background: #2f2f2f;
    color: #ececec;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    line-height: 1.4;
  }

  #message-input:focus {
    border-color: #5a5a5a;
  }

  #message-input::placeholder {
    color: #8e8e8e;
  }

  #send-btn {
    flex-shrink: 0;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: none;
    background: #3d3d3d;
    color: #8e8e8e;
    cursor: not-allowed;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease, color 0.15s ease, opacity 0.15s ease;
  }

  #send-btn.active {
    background: #2f6fed;
    color: #fff;
    cursor: pointer;
  }

  #send-btn.active:hover {
    background: #2660d1;
  }

  #send-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  #send-btn svg {
    width: 20px;
    height: 20px;
  }

  @media (min-width: 768px) {
    #sidebar {
      position: relative;
      transform: none;
    }
    #sidebar-backdrop {
      display: none !important;
    }
    #menu-btn {
      display: none;
    }
  }

  @media (max-width: 600px) {
    header {
      padding: 14px 16px;
      font-size: 16px;
    }
    .bubble {
      max-width: 85%;
      font-size: 14.5px;
    }
  }
</style>
</head>
<body>

<div id="layout">
  <div id="sidebar-backdrop"></div>

  <div id="sidebar">
    <button id="new-chat-btn" type="button">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
      New Chat
    </button>
    <div id="conversation-list"></div>
  </div>

  <div id="main">
    <header>
      <button id="menu-btn" type="button" aria-label="Toggle menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
      <span>TenAI</span>
    </header>

    <div id="chat-window"></div>

    <div id="input-area">
      <div id="image-preview-bar">
        <div id="image-preview-thumb">
          <img id="image-preview-img" src="" alt="Selected image preview">
          <button id="remove-image-btn" type="button" aria-label="Remove image">✕</button>
        </div>
      </div>
      <div id="input-row">
        <button id="attach-btn" type="button" aria-label="Attach image">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
          </svg>
        </button>
        <input id="file-input" type="file" accept="image/*" style="display: none;">
        <button id="mic-btn" type="button" aria-label="Voice input">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
            <line x1="12" y1="19" x2="12" y2="23"></line>
            <line x1="8" y1="23" x2="16" y2="23"></line>
          </svg>
        </button>
        <textarea id="message-input" placeholder="Message TenAI..." rows="1"></textarea>
        <button id="send-btn" type="button" aria-label="Send">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

<div id="lightbox">
  <button id="lightbox-close" type="button" aria-label="Close image viewer">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="6" x2="6" y2="18"></line>
      <line x1="6" y1="6" x2="18" y2="18"></line>
    </svg>
  </button>
  <img id="lightbox-img" src="" alt="Full size image">
</div>

<script>
  const chatWindow = document.getElementById('chat-window');
  const input = document.getElementById('message-input');
  const sendBtn = document.getElementById('send-btn');
  const newChatBtn = document.getElementById('new-chat-btn');
  const conversationList = document.getElementById('conversation-list');
  const sidebar = document.getElementById('sidebar');
  const sidebarBackdrop = document.getElementById('sidebar-backdrop');
  const menuBtn = document.getElementById('menu-btn');
  const attachBtn = document.getElementById('attach-btn');
  const micBtn = document.getElementById('mic-btn');
  const fileInput = document.getElementById('file-input');
  const imagePreviewBar = document.getElementById('image-preview-bar');
  const imagePreviewImg = document.getElementById('image-preview-img');
  const removeImageBtn = document.getElementById('remove-image-btn');
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');
  const lightboxClose = document.getElementById('lightbox-close');

  let pendingImage = null; // base64 data URL of image staged for the next message

  const ACTIVE_ID_KEY = 'tenai_active_id';
  const WELCOME_TEXT = "👋 Hi! I'm TenAI. How can I help you today?";
  const DB_NAME = 'tenai_db';
  const DB_VERSION = 1;
  const STORE_NAME = 'conversations';

  let isWaiting = false;
  let activeId = null;
  let conversationsCache = {}; // in-memory source of truth, kept in sync with IndexedDB

  // ---------- Storage helpers (IndexedDB) ----------
  // IndexedDB is used instead of localStorage because image-containing
  // conversations can be several MB, well past localStorage's ~5-10MB quota.
  // Each conversation is stored as its own record, so one large chat growing
  // doesn't risk the save of every other chat.

  let dbInstance = null;

  function openDB() {
    return new Promise(function(resolve, reject) {
      if (!window.indexedDB) {
        reject(new Error('IndexedDB not available'));
        return;
      }
      const request = indexedDB.open(DB_NAME, DB_VERSION);
      request.onupgradeneeded = function(e) {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(STORE_NAME)) {
          db.createObjectStore(STORE_NAME, { keyPath: 'id' });
        }
      };
      request.onsuccess = function(e) { resolve(e.target.result); };
      request.onerror = function(e) { reject(e.target.error); };
    });
  }

  function getDB() {
    if (dbInstance) return Promise.resolve(dbInstance);
    return openDB().then(function(db) {
      dbInstance = db;
      return db;
    });
  }

  function dbGetAllConversations() {
    return getDB().then(function(db) {
      return new Promise(function(resolve, reject) {
        const tx = db.transaction(STORE_NAME, 'readonly');
        const req = tx.objectStore(STORE_NAME).getAll();
        req.onsuccess = function() { resolve(req.result || []); };
        req.onerror = function() { reject(req.error); };
      });
    }).catch(function(err) {
      console.warn('Could not load conversations from IndexedDB:', err);
      return [];
    });
  }

  function dbSaveConversation(conv) {
    return getDB().then(function(db) {
      return new Promise(function(resolve, reject) {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        tx.objectStore(STORE_NAME).put(conv);
        tx.oncomplete = function() { resolve(); };
        tx.onerror = function() { reject(tx.error); };
      });
    }).catch(function(err) {
      console.warn('Could not save conversation to IndexedDB:', err);
    });
  }

  function dbDeleteConversation(id) {
    return getDB().then(function(db) {
      return new Promise(function(resolve, reject) {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        tx.objectStore(STORE_NAME).delete(id);
        tx.oncomplete = function() { resolve(); };
        tx.onerror = function() { reject(tx.error); };
      });
    }).catch(function(err) {
      console.warn('Could not delete conversation from IndexedDB:', err);
    });
  }

  function getActiveIdFromStorage() {
    try {
      return localStorage.getItem(ACTIVE_ID_KEY);
    } catch (err) {
      return null;
    }
  }

  function setActiveIdInStorage(id) {
    try {
      localStorage.setItem(ACTIVE_ID_KEY, id);
    } catch (err) {
      // fail silently — active id is just a convenience pointer
    }
  }

  function generateId() {
    return 'c_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
  }

  function createNewConversationObject() {
    const id = generateId();
    return {
      id: id,
      title: 'New Chat',
      messages: [{ text: WELCOME_TEXT, sender: 'ai' }],
      updatedAt: Date.now()
    };
  }

  // ---------- Image compression ----------
  // Phone camera photos are often several MB as base64. Resize + re-encode as
  // JPEG before storing/sending, both for faster uploads and a smaller payload.

  function compressImage(file) {
    return new Promise(function(resolve, reject) {
      const reader = new FileReader();
      reader.onerror = reject;
      reader.onload = function() {
        const img = new Image();
        img.onerror = reject;
        img.onload = function() {
          const MAX_DIMENSION = 1280;
          let width = img.width;
          let height = img.height;

          if (width > height && width > MAX_DIMENSION) {
            height = Math.round(height * (MAX_DIMENSION / width));
            width = MAX_DIMENSION;
          } else if (height > MAX_DIMENSION) {
            width = Math.round(width * (MAX_DIMENSION / height));
            height = MAX_DIMENSION;
          }

          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);

          resolve(canvas.toDataURL('image/jpeg', 0.72));
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    });
  }

  // ---------- Conversation management ----------

  function getActiveConversation() {
    return conversationsCache[activeId] || null;
  }

  function persistMessage(text, sender, image) {
    const conv = conversationsCache[activeId];
    if (!conv) return;

    const entry = { text: text, sender: sender };
    if (image) entry.image = image;

    conv.messages.push(entry);
    conv.updatedAt = Date.now();

    if (conv.title === 'New Chat' && sender === 'user') {
      const titleSource = text && text.length > 0 ? text : 'Image';
      conv.title = titleSource.length > 30 ? titleSource.slice(0, 30) + '...' : titleSource;
    }

    dbSaveConversation(conv);
    renderSidebar();
  }

  function buildMessagesForApi() {
    const conv = getActiveConversation();
    if (!conv) return [];

    return conv.messages
      .filter(function(msg) {
        return msg.text !== WELCOME_TEXT;
      })
      .map(function(msg) {
        const role = msg.sender === 'ai' ? 'assistant' : 'user';

        if (msg.image) {
          const parts = [];
          if (msg.text) {
            parts.push({ type: 'text', text: msg.text });
          }
          parts.push({ type: 'image_url', image_url: { url: msg.image } });
          return { role: role, content: parts };
        }

        return { role: role, content: msg.text };
      });
  }

  function startNewConversation() {
    const newConv = createNewConversationObject();
    conversationsCache[newConv.id] = newConv;
    dbSaveConversation(newConv);

    activeId = newConv.id;
    setActiveIdInStorage(activeId);

    renderChatWindow(newConv.messages);
    renderSidebar();
    closeSidebarOnMobile();
  }

  function switchToConversation(id) {
    if (id === activeId) {
      closeSidebarOnMobile();
      return;
    }

    const conv = conversationsCache[id];
    if (!conv) return;

    activeId = id;
    setActiveIdInStorage(activeId);

    renderChatWindow(conv.messages);
    renderSidebar();
    closeSidebarOnMobile();
  }

  function initConversations() {
    return dbGetAllConversations().then(function(records) {
      conversationsCache = {};
      records.forEach(function(conv) {
        conversationsCache[conv.id] = conv;
      });

      let storedActiveId = getActiveIdFromStorage();
      const ids = Object.keys(conversationsCache);

      if (ids.length === 0) {
        const newConv = createNewConversationObject();
        conversationsCache[newConv.id] = newConv;
        dbSaveConversation(newConv);
        activeId = newConv.id;
        setActiveIdInStorage(activeId);
      } else if (storedActiveId && conversationsCache[storedActiveId]) {
        activeId = storedActiveId;
      } else {
        ids.sort(function(a, b) {
          return conversationsCache[b].updatedAt - conversationsCache[a].updatedAt;
        });
        activeId = ids[0];
        setActiveIdInStorage(activeId);
      }

      renderChatWindow(conversationsCache[activeId].messages);
      renderSidebar();
    });
  }

  // ---------- Rendering ----------

  function scrollToBottom() {
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function createBubble(text, sender, image) {
    const row = document.createElement('div');
    row.className = 'message-row ' + sender;

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    if (image) {
      const img = document.createElement('img');
      img.className = 'bubble-image';
      img.src = image;
      img.alt = 'Uploaded image';
      img.addEventListener('click', function() {
        openLightbox(image);
      });
      bubble.appendChild(img);
    }

    if (text) {
      const textSpan = document.createElement('span');
      textSpan.textContent = text;
      bubble.appendChild(textSpan);
    }

    row.appendChild(bubble);
    return { row: row, bubble: bubble };
  }

  function addMessage(text, sender, skipPersist, image) {
    const { row, bubble } = createBubble(text, sender, image);
    chatWindow.appendChild(row);
    scrollToBottom();

    if (!skipPersist) {
      persistMessage(text, sender, image);
    }

    return bubble;
  }

  function renderChatWindow(messages) {
    chatWindow.innerHTML = '';
    messages.forEach(function(msg) {
      const { row } = createBubble(msg.text, msg.sender, msg.image);
      chatWindow.appendChild(row);
    });
    scrollToBottom();
  }

  function renameConversation(id, newTitle) {
    const conv = conversationsCache[id];
    if (!conv) return;

    const trimmed = newTitle.trim();
    conv.title = trimmed.length > 0 ? trimmed : 'New Chat';
    dbSaveConversation(conv);
    renderSidebar();
  }

  function deleteConversation(id) {
    delete conversationsCache[id];
    dbDeleteConversation(id);

    const remainingIds = Object.keys(conversationsCache);

    if (remainingIds.length === 0) {
      const newConv = createNewConversationObject();
      conversationsCache[newConv.id] = newConv;
      dbSaveConversation(newConv);
      activeId = newConv.id;
      setActiveIdInStorage(activeId);
      renderChatWindow(newConv.messages);
    } else if (id === activeId) {
      remainingIds.sort(function(a, b) {
        return conversationsCache[b].updatedAt - conversationsCache[a].updatedAt;
      });
      activeId = remainingIds[0];
      setActiveIdInStorage(activeId);
      renderChatWindow(conversationsCache[activeId].messages);
    }

    renderSidebar();
  }

  function renderSidebar() {
    const ids = Object.keys(conversationsCache);

    ids.sort(function(a, b) {
      return conversationsCache[b].updatedAt - conversationsCache[a].updatedAt;
    });

    conversationList.innerHTML = '';

    ids.forEach(function(id) {
      const conv = conversationsCache[id];
      const item = document.createElement('div');
      item.className = 'conversation-item' + (id === activeId ? ' active' : '');

      const titleSpan = document.createElement('span');
      titleSpan.className = 'conversation-title';
      titleSpan.textContent = conv.title;

      item.appendChild(titleSpan);

      const actions = document.createElement('div');
      actions.className = 'conv-actions';

      const editBtn = document.createElement('button');
      editBtn.type = 'button';
      editBtn.className = 'conv-action-btn';
      editBtn.setAttribute('aria-label', 'Rename conversation');
      editBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>';

      const deleteBtn = document.createElement('button');
      deleteBtn.type = 'button';
      deleteBtn.className = 'conv-action-btn';
      deleteBtn.setAttribute('aria-label', 'Delete conversation');
      deleteBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path></svg>';

      actions.appendChild(editBtn);
      actions.appendChild(deleteBtn);
      item.appendChild(actions);

      item.addEventListener('click', function() {
        switchToConversation(id);
      });

      editBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        startInlineRename(item, titleSpan, id, conv.title);
      });

      deleteBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        deleteConversation(id);
      });

      conversationList.appendChild(item);
    });
  }

  function startInlineRename(item, titleSpan, id, currentTitle) {
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'conversation-title-input';
    input.value = currentTitle;

    item.replaceChild(input, titleSpan);
    input.focus();
    input.select();

    function commit() {
      renameConversation(id, input.value);
    }

    input.addEventListener('click', function(e) {
      e.stopPropagation();
    });

    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        commit();
      } else if (e.key === 'Escape') {
        e.preventDefault();
        renderSidebar();
      }
    });

    input.addEventListener('blur', commit);
  }

  function addThinkingBubble() {
    const row = document.createElement('div');
    row.className = 'message-row ai';
    row.id = 'thinking-row';

    const bubble = document.createElement('div');
    bubble.className = 'bubble thinking';
    bubble.innerHTML = 'TenAI is thinking<span class="dot"></span><span class="dot"></span><span class="dot"></span>';

    row.appendChild(bubble);
    chatWindow.appendChild(row);
    scrollToBottom();
  }

  function removeThinkingBubble() {
    const row = document.getElementById('thinking-row');
    if (row) row.remove();
  }

  function autoResize() {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
  }

  function updateSendBtnState() {
    if ((input.value.trim().length > 0 || pendingImage) && !isWaiting) {
      sendBtn.classList.add('active');
    } else {
      sendBtn.classList.remove('active');
    }
  }

  // ---------- Image lightbox ----------

  let lbScale = 1;
  let lbTranslateX = 0;
  let lbTranslateY = 0;
  let lbStartDistance = 0;
  let lbStartScale = 1;
  let lbPanning = false;
  let lbLastX = 0;
  let lbLastY = 0;

  function applyLightboxTransform() {
    lightboxImg.style.transform =
      'translate(' + lbTranslateX + 'px, ' + lbTranslateY + 'px) scale(' + lbScale + ')';
  }

  function resetLightboxTransform() {
    lbScale = 1;
    lbTranslateX = 0;
    lbTranslateY = 0;
    applyLightboxTransform();
  }

  function openLightbox(src) {
    lightboxImg.src = src;
    resetLightboxTransform();
    lightbox.classList.add('open');
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    lightboxImg.src = '';
    resetLightboxTransform();
  }

  function touchDistance(touches) {
    const dx = touches[0].clientX - touches[1].clientX;
    const dy = touches[0].clientY - touches[1].clientY;
    return Math.sqrt(dx * dx + dy * dy);
  }

  lightboxClose.addEventListener('click', closeLightbox);

  lightbox.addEventListener('click', function(e) {
    if (e.target === lightbox) {
      closeLightbox();
    }
  });

  lightboxImg.addEventListener('touchstart', function(e) {
    if (e.touches.length === 2) {
      lbStartDistance = touchDistance(e.touches);
      lbStartScale = lbScale;
      lbPanning = false;
    } else if (e.touches.length === 1 && lbScale > 1) {
      lbPanning = true;
      lbLastX = e.touches[0].clientX;
      lbLastY = e.touches[0].clientY;
    }
  }, { passive: true });

  lightboxImg.addEventListener('touchmove', function(e) {
    if (e.touches.length === 2) {
      e.preventDefault();
      const newDistance = touchDistance(e.touches);
      let newScale = lbStartScale * (newDistance / lbStartDistance);
      newScale = Math.min(Math.max(newScale, 1), 4);
      lbScale = newScale;
      applyLightboxTransform();
    } else if (e.touches.length === 1 && lbPanning) {
      e.preventDefault();
      const dx = e.touches[0].clientX - lbLastX;
      const dy = e.touches[0].clientY - lbLastY;
      lbLastX = e.touches[0].clientX;
      lbLastY = e.touches[0].clientY;
      lbTranslateX += dx;
      lbTranslateY += dy;
      applyLightboxTransform();
    }
  }, { passive: false });

  lightboxImg.addEventListener('touchend', function(e) {
    lbPanning = false;
    if (lbScale <= 1) {
      resetLightboxTransform();
    }
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && lightbox.classList.contains('open')) {
      closeLightbox();
    }
  });

  // ---------- Sidebar open/close (mobile) ----------

  function openSidebar() {
    sidebar.classList.add('open');
    sidebarBackdrop.classList.add('open');
  }

  function closeSidebar() {
    sidebar.classList.remove('open');
    sidebarBackdrop.classList.remove('open');
  }

  function closeSidebarOnMobile() {
    if (window.innerWidth < 768) {
      closeSidebar();
    }
  }

  menuBtn.addEventListener('click', function() {
    if (sidebar.classList.contains('open')) {
      closeSidebar();
    } else {
      openSidebar();
    }
  });

  sidebarBackdrop.addEventListener('click', closeSidebar);

  // ---------- Image attach ----------

  attachBtn.addEventListener('click', function() {
    fileInput.click();
  });

  fileInput.addEventListener('change', function() {
    const file = fileInput.files && fileInput.files[0];
    if (!file) return;

    compressImage(file).then(function(dataUrl) {
      pendingImage = dataUrl;
      imagePreviewImg.src = pendingImage;
      imagePreviewBar.classList.add('visible');
      updateSendBtnState();
    }).catch(function(err) {
      console.error('Image processing failed:', err);
    });

    fileInput.value = '';
  });

  // ---------- Voice input ----------
  // Uses the browser's built-in Web Speech API (free, no external service,
  // doesn't touch the OpenRouter quota). Supported in Chrome/Edge/Safari;
  // the button is disabled with a tooltip on browsers without support.
  //
  // continuous:true is unreliable on Chrome for Android — it frequently
  // does nothing at all (no error, no onstart, no listening indicator)
  // instead of starting. continuous:false is used instead, which also
  // has the benefit of auto-stopping as soon as the user finishes speaking.
  //
  // A getUserMedia() permission check runs before recognition.start() so
  // permission problems surface as a real, visible error instead of being
  // silently swallowed by SpeechRecognition on some Android builds.
  //
  // An explicit state machine ('inactive' | 'starting' | 'active' |
  // 'stopping') guarantees recognition.start() is never called while a
  // previous instance is still active/stopping, which is what causes
  // "recognition has already started".

  const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
  const speechSupported = !!SpeechRecognitionAPI;

  let recognition = null;
  let recognitionState = 'inactive'; // 'inactive' | 'starting' | 'active' | 'stopping'
  let baseTextBeforeRecording = '';
  let gotFinalTranscript = false;

  if (!speechSupported) {
    micBtn.disabled = true;
    micBtn.title = 'Voice input is not supported in this browser';
  }

  function createRecognition() {
    const rec = new SpeechRecognitionAPI();
    rec.continuous = false;
    rec.interimResults = true;
    rec.lang = navigator.language || 'en-US';

    rec.onstart = function() {
      recognitionState = 'active';
      micBtn.classList.add('recording');
    };

    rec.onresult = function(event) {
      let finalTranscript = '';
      let interimTranscript = '';

      for (let i = event.resultIndex; i < event.results.length; i++) {
        const transcript = event.results[i][0].transcript;
        if (event.results[i].isFinal) {
          finalTranscript += transcript;
        } else {
          interimTranscript += transcript;
        }
      }

      const separator = baseTextBeforeRecording && !baseTextBeforeRecording.endsWith(' ') ? ' ' : '';
      input.value = baseTextBeforeRecording + separator + finalTranscript + interimTranscript;

      if (finalTranscript) {
        baseTextBeforeRecording = input.value.trim();
        gotFinalTranscript = true;
      }

      autoResize();
      updateSendBtnState();
    };

    rec.onerror = function(event) {
      console.warn('Speech recognition error:', event.error);
      // 'not-allowed' / 'service-not-allowed' mean the browser blocked mic
      // access for this site. Nothing more to do besides resetting state
      // so the button is usable again on the next tap.
      recognitionState = 'inactive';
      micBtn.classList.remove('recording');
      recognition = null;
    };

    rec.onend = function() {
      recognitionState = 'inactive';
      micBtn.classList.remove('recording');
      recognition = null;

      // Auto-send, ChatGPT-style: briefly show the transcribed text in the
      // box, then send it automatically. Guarded by gotFinalTranscript so
      // this fires at most once per recording, preventing duplicate sends.
      if (gotFinalTranscript && input.value.trim().length > 0) {
        gotFinalTranscript = false;
        setTimeout(function() {
          sendMessage();
        }, 400);
      }
    };

    return rec;
  }

  function startRecording() {
    if (!speechSupported) return;
    if (recognitionState !== 'inactive') return; // already starting/active/stopping — ignore

    recognitionState = 'starting';
    gotFinalTranscript = false;

    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
      navigator.mediaDevices.getUserMedia({ audio: true })
        .then(function(stream) {
          // Permission confirmed. Release this probe stream immediately —
          // SpeechRecognition opens its own microphone stream internally.
          stream.getTracks().forEach(function(track) { track.stop(); });

          if (recognitionState !== 'starting') return; // stopped/cancelled while awaiting permission

          baseTextBeforeRecording = input.value.trim();
          recognition = createRecognition();

          try {
            recognition.start();
          } catch (err) {
            console.warn('Could not start speech recognition:', err);
            recognitionState = 'inactive';
            micBtn.classList.remove('recording');
            recognition = null;
          }
        })
        .catch(function(err) {
          console.warn('Microphone permission denied or unavailable:', err);
          recognitionState = 'inactive';
          micBtn.classList.remove('recording');
          recognition = null;
        });
    } else {
      // Browser lacks getUserMedia (rare) — fall back to letting
      // SpeechRecognition handle its own permission prompt directly.
      baseTextBeforeRecording = input.value.trim();
      recognition = createRecognition();

      try {
        recognition.start();
      } catch (err) {
        console.warn('Could not start speech recognition:', err);
        recognitionState = 'inactive';
        micBtn.classList.remove('recording');
        recognition = null;
      }
    }
  }

  function stopRecording() {
    if (recognitionState !== 'active' && recognitionState !== 'starting') return;
    recognitionState = 'stopping';
    if (recognition) {
      try {
        recognition.stop();
      } catch (err) {
        // onend/onerror will still fire and fully reset state
      }
    } else {
      // Was still awaiting the permission prompt with no recognition
      // instance yet — just reset state directly.
      recognitionState = 'inactive';
      micBtn.classList.remove('recording');
    }
  }

  micBtn.addEventListener('click', function() {
    if (recognitionState === 'inactive') {
      startRecording();
    } else if (recognitionState === 'active' || recognitionState === 'starting') {
      stopRecording();
    }
    // if state is 'stopping', ignore the tap — this is what prevents rapid
    // double-taps from causing overlapping start()/stop() calls
  });

  removeImageBtn.addEventListener('click', function() {
    pendingImage = null;
    imagePreviewImg.src = '';
    imagePreviewBar.classList.remove('visible');
    updateSendBtnState();
  });

  // ---------- Sending messages (streaming) ----------

  input.addEventListener('input', function() {
    autoResize();
    updateSendBtnState();
  });

  async function sendMessage() {
    const text = input.value.trim();
    const imageToSend = pendingImage;

    if (!text && !imageToSend) return;
    if (isWaiting) return;

    addMessage(text, 'user', false, imageToSend);
    input.value = '';
    autoResize();

    pendingImage = null;
    imagePreviewImg.src = '';
    imagePreviewBar.classList.remove('visible');

    isWaiting = true;
    sendBtn.disabled = true;
    updateSendBtnState();
    addThinkingBubble();

    let aiBubble = null;
    let accumulated = '';

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ message: text, messages: buildMessagesForApi() })
      });

      if (!response.ok || !response.body) {
        throw new Error('Request failed with status ' + response.status);
      }

      const contentType = response.headers.get('Content-Type') || '';

      if (contentType.includes('application/json')) {
        // Non-streaming reply (used for image requests)
        const data = await response.json();
        removeThinkingBubble();
        accumulated = data.reply || '(No reply received)';
        addMessage(accumulated, 'ai', true);
        persistMessage(accumulated, 'ai');
        return;
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          const trimmed = line.trim();
          if (!trimmed.startsWith('data:')) continue;

          const dataStr = trimmed.slice(5).trim();
          if (dataStr === '[DONE]' || dataStr === '') continue;

          try {
            const parsed = JSON.parse(dataStr);
            const delta = parsed.choices?.[0]?.delta?.content;
            if (delta) {
              if (!aiBubble) {
                removeThinkingBubble();
                aiBubble = addMessage('', 'ai', true);
              }
              accumulated += delta;
              aiBubble.textContent = accumulated;
              scrollToBottom();
            }
          } catch (e) {
            // ignore incomplete/malformed JSON fragments
          }
        }
      }

      removeThinkingBubble();

      if (!accumulated) {
        accumulated = '(No reply received)';
        addMessage(accumulated, 'ai', true);
      }

      persistMessage(accumulated, 'ai');

    } catch (err) {
      removeThinkingBubble();
      addMessage('Error: could not reach TenAI. Please try again.', 'ai');
    } finally {
      isWaiting = false;
      sendBtn.disabled = false;
      updateSendBtnState();
      input.focus();
    }
  }

  sendBtn.addEventListener('click', sendMessage);

  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  newChatBtn.addEventListener('click', startNewConversation);

  initConversations();
  updateSendBtnState();
  input.focus();
</script>

</body>
</html>
