<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TenAI Chat</title>
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    height: 100%;
    background: #212121;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    max-width: 900px;
    margin: 0 auto;
    background: #212121;
  }

  header {
    padding: 16px 20px;
    border-bottom: 1px solid #2f2f2f;
    color: #ececec;
    font-size: 18px;
    font-weight: 600;
    flex-shrink: 0;
    background: #212121;
  }

  #chat-window {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  #chat-window::-webkit-scrollbar {
    width: 8px;
  }
  #chat-window::-webkit-scrollbar-thumb {
    background: #444;
    border-radius: 4px;
  }
  #chat-window::-webkit-scrollbar-track {
    background: transparent;
  }

  .message-row {
    display: flex;
    width: 100%;
  }

  .message-row.user {
    justify-content: flex-end;
  }

  .message-row.ai {
    justify-content: flex-start;
  }

  .bubble {
    max-width: 75%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .message-row.user .bubble {
    background: #2f6fed;
    color: #ffffff;
    border-bottom-right-radius: 4px;
  }

  .message-row.ai .bubble {
    background: #2f2f2f;
    color: #ececec;
    border-bottom-left-radius: 4px;
  }

  .bubble.thinking {
    color: #9b9b9b;
    font-style: italic;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .dot {
    width: 6px;
    height: 6px;
    background: #9b9b9b;
    border-radius: 50%;
    animation: blink 1.4s infinite both;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; }
    40% { opacity: 1; }
  }

  #input-area {
    flex-shrink: 0;
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    border-top: 1px solid #2f2f2f;
    background: #212121;
    display: flex;
    align-items: flex-end;
    gap: 10px;
  }

  #message-input {
    flex: 1;
    resize: none;
    max-height: 140px;
    min-height: 44px;
    padding: 12px 14px;
    border-radius: 22px;
    border: 1px solid #3d3d3d;
    background: #2f2f2f;
    color: #ececec;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    line-height: 1.4;
  }

  #message-input:focus {
    border-color: #5a5a5a;
  }

  #message-input::placeholder {
    color: #8e8e8e;
  }

  #send-btn {
    flex-shrink: 0;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: none;
    background: #3d3d3d;
    color: #8e8e8e;
    cursor: not-allowed;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease, color 0.15s ease, opacity 0.15s ease;
  }

  #send-btn.active {
    background: #2f6fed;
    color: #fff;
    cursor: pointer;
  }

  #send-btn.active:hover {
    background: #2660d1;
  }

  #send-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  #send-btn svg {
    width: 20px;
    height: 20px;
  }

  @media (max-width: 600px) {
    header {
      padding: 14px 16px;
      font-size: 16px;
    }
    .bubble {
      max-width: 85%;
      font-size: 14.5px;
    }
  }
</style>
</head>
<body>

<div id="app">
  <header style="display:flex;justify-content:space-between;align-items:center;">
  <span>TenAI</span>

  <button id="new-chat-btn" style="
    background:#2f6fed;
    color:white;
    border:none;
    padding:8px 14px;
    border-radius:8px;
    cursor:pointer;
  ">
    New Chat
  </button>
</header>

  <div id="chat-window"></div>

  <div id="input-area">
    <textarea id="message-input" placeholder="Message TenAI..." rows="1"></textarea>
    <button id="send-btn" type="button" aria-label="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<script>
  const chatWindow = document.getElementById('chat-window');
  const input = document.getElementById('message-input');
  const sendBtn = document.getElementById('send-btn');

  const STORAGE_KEY = 'tenai_chat_history';
  const WELCOME_TEXT = "👋 Hi! I'm TenAI. How can I help you today?";

  let messages = [];
let isWaiting = false;

  function scrollToBottom() {
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function loadHistory() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch (err) {
      return null;
    }
  }

  function saveHistory(history) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
    } catch (err) {
      // localStorage unavailable or full; fail silently
    }
  }

  function getHistory() {
    return loadHistory() || [];
  }

  function persistMessage(text, sender) {
    const history = getHistory();
    history.push({ text: text, sender: sender });
    saveHistory(history);
  }

  function addMessage(text, sender, skipPersist) {
    const row = document.createElement('div');
    row.className = 'message-row ' + sender;

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    row.appendChild(bubble);
    chatWindow.appendChild(row);
    scrollToBottom();

    if (!skipPersist) {
      persistMessage(text, sender);
    }

    return bubble;
  }

  function initChat() {
    const history = loadHistory();

    if (history && history.length > 0) {
      history.forEach(function(msg) {
        addMessage(msg.text, msg.sender, true);
      });
    } else {
      addMessage(WELCOME_TEXT, 'ai');
    }
  }

  function addThinkingBubble() {
    const row = document.createElement('div');
    row.className = 'message-row ai';
    row.id = 'thinking-row';

    const bubble = document.createElement('div');
    bubble.className = 'bubble thinking';
    bubble.innerHTML = 'TenAI is thinking<span class="dot"></span><span class="dot"></span><span class="dot"></span>';

    row.appendChild(bubble);
    chatWindow.appendChild(row);
    scrollToBottom();
  }

  function removeThinkingBubble() {
    const row = document.getElementById('thinking-row');
    if (row) row.remove();
  }

  function autoResize() {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
  }

  function updateSendBtnState() {
    if (input.value.trim().length > 0 && !isWaiting) {
      sendBtn.classList.add('active');
    } else {
      sendBtn.classList.remove('active');
    }
  }

  input.addEventListener('input', function() {
    autoResize();
    updateSendBtnState();
  });
function buildMessagesForApi() {
  return getHistory()
    .filter(function(msg) {
      return msg.text !== WELCOME_TEXT;
    })
    .map(function(msg) {
      return {
        role: msg.sender === 'ai' ? 'assistant' : 'user',
        content: msg.text
      };
    });
}
  async function sendMessage() {
    const text = input.value.trim();
    if (!text || isWaiting) return;

    addMessage(text, 'user');

messages.push({
  role: "user",
  content: text
});

input.value = '';
autoResize();

    isWaiting = true;
    sendBtn.disabled = true;
    updateSendBtnState();
    addThinkingBubble();

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
  message: text,
  messages: buildMessagesForApi()
})
      });

      if (!response.ok) {
        throw new Error('Request failed with status ' + response.status);
      }

      const data = await response.json();
      removeThinkingBubble();
      addMessage(data.reply || '(No reply received)', 'ai');
    } catch (err) {
      removeThinkingBubble();
      addMessage('Error: could not reach TenAI. Please try again.', 'ai');
    } finally {
      isWaiting = false;
      sendBtn.disabled = false;
      updateSendBtnState();
      input.focus();
    }
  }

  sendBtn.addEventListener('click', sendMessage);

  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  initChat();
  updateSendBtnState();
  input.focus();

document.getElementById("new-chat-btn").addEventListener("click", () => {
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
});
</script>

</body>
</html>
