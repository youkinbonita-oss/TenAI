<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TenAI Chat</title>
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    height: 100%;
    background: #212121;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden;
  }

  #layout {
    display: flex;
    height: 100vh;
    height: 100dvh;
    width: 100%;
  }

  /* Sidebar */
  #sidebar {
    width: 260px;
    flex-shrink: 0;
    background: #171717;
    display: flex;
    flex-direction: column;
    border-right: 1px solid #2f2f2f;
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;
    transform: translateX(-100%);
    transition: transform 0.2s ease;
    z-index: 30;
  }

  #sidebar.open {
    transform: translateX(0);
  }

  #sidebar-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 20;
  }

  #sidebar-backdrop.open {
    display: block;
  }

  #new-chat-btn {
    margin: 12px;
    background: #2f6fed;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #new-chat-btn:hover {
    background: #2660d1;
  }

  #conversation-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 8px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  #conversation-list::-webkit-scrollbar {
    width: 6px;
  }
  #conversation-list::-webkit-scrollbar-thumb {
    background: #3d3d3d;
    border-radius: 4px;
  }

  .conversation-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 8px 10px 12px;
    border-radius: 8px;
    color: #d4d4d4;
    font-size: 14px;
    cursor: pointer;
  }

  .conversation-item:hover {
    background: #2a2a2a;
  }

  .conversation-item.active {
    background: #2f2f2f;
    color: #fff;
  }

  .conversation-title {
    flex: 1;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .conversation-title-input {
    flex: 1;
    min-width: 0;
    background: #1f1f1f;
    border: 1px solid #4a4a4a;
    color: #fff;
    font-size: 14px;
    font-family: inherit;
    border-radius: 6px;
    padding: 4px 6px;
    outline: none;
  }

  .conv-actions {
    display: flex;
    gap: 2px;
    flex-shrink: 0;
  }

  .conv-action-btn {
    background: none;
    border: none;
    color: #9b9b9b;
    cursor: pointer;
    padding: 4px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .conv-action-btn:hover {
    background: #3d3d3d;
    color: #fff;
  }

  .conv-action-btn svg {
    width: 15px;
    height: 15px;
  }

  /* Main area */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100%;
    min-width: 0;
  }

  header {
    padding: 14px 16px;
    border-bottom: 1px solid #2f2f2f;
    color: #ececec;
    font-size: 17px;
    font-weight: 600;
    flex-shrink: 0;
    background: #212121;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  #menu-btn {
    background: none;
    border: none;
    color: #ececec;
    cursor: pointer;
    padding: 4px;
    display: flex;
    align-items: center;
  }

  #menu-btn svg {
    width: 22px;
    height: 22px;
  }

  #chat-window {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  #chat-window::-webkit-scrollbar {
    width: 8px;
  }
  #chat-window::-webkit-scrollbar-thumb {
    background: #444;
    border-radius: 4px;
  }
  #chat-window::-webkit-scrollbar-track {
    background: transparent;
  }

  .message-row {
    display: flex;
    width: 100%;
  }

  .message-row.user {
    justify-content: flex-end;
  }

  .message-row.ai {
    justify-content: flex-start;
  }

  .bubble {
    max-width: 75%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .message-row.user .bubble {
    background: #2f6fed;
    color: #ffffff;
    border-bottom-right-radius: 4px;
  }

  .message-row.ai .bubble {
    background: #2f2f2f;
    color: #ececec;
    border-bottom-left-radius: 4px;
  }

  .bubble.thinking {
    color: #9b9b9b;
    font-style: italic;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .dot {
    width: 6px;
    height: 6px;
    background: #9b9b9b;
    border-radius: 50%;
    animation: blink 1.4s infinite both;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; }
    40% { opacity: 1; }
  }

  #input-area {
    flex-shrink: 0;
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    border-top: 1px solid #2f2f2f;
    background: #212121;
    display: flex;
    align-items: flex-end;
    gap: 10px;
  }

  #message-input {
    flex: 1;
    resize: none;
    max-height: 140px;
    min-height: 44px;
    padding: 12px 14px;
    border-radius: 22px;
    border: 1px solid #3d3d3d;
    background: #2f2f2f;
    color: #ececec;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    line-height: 1.4;
  }

  #message-input:focus {
    border-color: #5a5a5a;
  }

  #message-input::placeholder {
    color: #8e8e8e;
  }

  #send-btn {
    flex-shrink: 0;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: none;
    background: #3d3d3d;
    color: #8e8e8e;
    cursor: not-allowed;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease, color 0.15s ease, opacity 0.15s ease;
  }

  #send-btn.active {
    background: #2f6fed;
    color: #fff;
    cursor: pointer;
  }

  #send-btn.active:hover {
    background: #2660d1;
  }

  #send-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  #send-btn svg {
    width: 20px;
    height: 20px;
  }

  @media (min-width: 768px) {
    #sidebar {
      position: relative;
      transform: none;
    }
    #sidebar-backdrop {
      display: none !important;
    }
    #menu-btn {
      display: none;
    }
  }

  @media (max-width: 600px) {
    header {
      padding: 14px 16px;
      font-size: 16px;
    }
    .bubble {
      max-width: 85%;
      font-size: 14.5px;
    }
  }
</style>
</head>
<body>

<div id="layout">
  <div id="sidebar-backdrop"></div>

  <div id="sidebar">
    <button id="new-chat-btn" type="button">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
      New Chat
    </button>
    <div id="conversation-list"></div>
  </div>

  <div id="main">
    <header>
      <button id="menu-btn" type="button" aria-label="Toggle menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
      <span>TenAI</span>
    </header>

    <div id="chat-window"></div>

    <div id="input-area">
      <textarea id="message-input" placeholder="Message TenAI..." rows="1"></textarea>
      <button id="send-btn" type="button" aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
  const chatWindow = document.getElementById('chat-window');
  const input = document.getElementById('message-input');
  const sendBtn = document.getElementById('send-btn');
  const newChatBtn = document.getElementById('new-chat-btn');
  const conversationList = document.getElementById('conversation-list');
  const sidebar = document.getElementById('sidebar');
  const sidebarBackdrop = document.getElementById('sidebar-backdrop');
  const menuBtn = document.getElementById('menu-btn');

  const CONVERSATIONS_KEY = 'tenai_conversations';
  const ACTIVE_ID_KEY = 'tenai_active_id';
  const WELCOME_TEXT = "👋 Hi! I'm TenAI. How can I help you today?";

  let isWaiting = false;
  let activeId = null;

  // ---------- Storage helpers ----------

  function loadConversations() {
    try {
      const raw = localStorage.getItem(CONVERSATIONS_KEY);
      return raw ? JSON.parse(raw) : {};
    } catch (err) {
      return {};
    }
  }

  function saveConversations(conversations) {
    try {
      localStorage.setItem(CONVERSATIONS_KEY, JSON.stringify(conversations));
    } catch (err) {
      // localStorage unavailable or full; fail silently
    }
  }

  function getActiveIdFromStorage() {
    try {
      return localStorage.getItem(ACTIVE_ID_KEY);
    } catch (err) {
      return null;
    }
  }

  function setActiveIdInStorage(id) {
    try {
      localStorage.setItem(ACTIVE_ID_KEY, id);
    } catch (err) {
      // fail silently
    }
  }

  function generateId() {
    return 'c_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
  }

  function createNewConversationObject() {
    const id = generateId();
    return {
      id: id,
      title: 'New Chat',
      messages: [{ text: WELCOME_TEXT, sender: 'ai' }],
      updatedAt: Date.now()
    };
  }

  // ---------- Conversation management ----------

  function getActiveConversation() {
    const conversations = loadConversations();
    return conversations[activeId] || null;
  }

  function persistMessage(text, sender) {
    const conversations = loadConversations();
    const conv = conversations[activeId];
    if (!conv) return;

    conv.messages.push({ text: text, sender: sender });
    conv.updatedAt = Date.now();

    if (conv.title === 'New Chat' && sender === 'user') {
      conv.title = text.length > 30 ? text.slice(0, 30) + '...' : text;
    }

    conversations[activeId] = conv;
    saveConversations(conversations);
    renderSidebar();
  }

  function buildMessagesForApi() {
    const conv = getActiveConversation();
    if (!conv) return [];

    return conv.messages
      .filter(function(msg) {
        return msg.text !== WELCOME_TEXT;
      })
      .map(function(msg) {
        return {
          role: msg.sender === 'ai' ? 'assistant' : 'user',
          content: msg.text
        };
      });
  }

  function startNewConversation() {
    const conversations = loadConversations();
    const newConv = createNewConversationObject();
    conversations[newConv.id] = newConv;
    saveConversations(conversations);

    activeId = newConv.id;
    setActiveIdInStorage(activeId);

    renderChatWindow(newConv.messages);
    renderSidebar();
    closeSidebarOnMobile();
  }

  function switchToConversation(id) {
    if (id === activeId) {
      closeSidebarOnMobile();
      return;
    }

    const conversations = loadConversations();
    const conv = conversations[id];
    if (!conv) return;

    activeId = id;
    setActiveIdInStorage(activeId);

    renderChatWindow(conv.messages);
    renderSidebar();
    closeSidebarOnMobile();
  }

  function initConversations() {
    const conversations = loadConversations();
    let storedActiveId = getActiveIdFromStorage();

    const ids = Object.keys(conversations);

    if (ids.length === 0) {
      const newConv = createNewConversationObject();
      conversations[newConv.id] = newConv;
      saveConversations(conversations);
      activeId = newConv.id;
      setActiveIdInStorage(activeId);
    } else if (storedActiveId && conversations[storedActiveId]) {
      activeId = storedActiveId;
    } else {
      ids.sort(function(a, b) {
        return conversations[b].updatedAt - conversations[a].updatedAt;
      });
      activeId = ids[0];
      setActiveIdInStorage(activeId);
    }

    renderChatWindow(conversations[activeId].messages);
    renderSidebar();
  }

  // ---------- Rendering ----------

  function scrollToBottom() {
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function createBubble(text, sender) {
    const row = document.createElement('div');
    row.className = 'message-row ' + sender;

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    row.appendChild(bubble);
    return { row: row, bubble: bubble };
  }

  function addMessage(text, sender, skipPersist) {
    const { row, bubble } = createBubble(text, sender);
    chatWindow.appendChild(row);
    scrollToBottom();

    if (!skipPersist) {
      persistMessage(text, sender);
    }

    return bubble;
  }

  function renderChatWindow(messages) {
    chatWindow.innerHTML = '';
    messages.forEach(function(msg) {
      const { row } = createBubble(msg.text, msg.sender);
      chatWindow.appendChild(row);
    });
    scrollToBottom();
  }

  function renameConversation(id, newTitle) {
    const conversations = loadConversations();
    const conv = conversations[id];
    if (!conv) return;

    const trimmed = newTitle.trim();
    conv.title = trimmed.length > 0 ? trimmed : 'New Chat';
    conversations[id] = conv;
    saveConversations(conversations);
    renderSidebar();
  }

  function deleteConversation(id) {
    const conversations = loadConversations();
    delete conversations[id];
    saveConversations(conversations);

    const remainingIds = Object.keys(conversations);

    if (remainingIds.length === 0) {
      const newConv = createNewConversationObject();
      conversations[newConv.id] = newConv;
      saveConversations(conversations);
      activeId = newConv.id;
      setActiveIdInStorage(activeId);
      renderChatWindow(newConv.messages);
    } else if (id === activeId) {
      remainingIds.sort(function(a, b) {
        return conversations[b].updatedAt - conversations[a].updatedAt;
      });
      activeId = remainingIds[0];
      setActiveIdInStorage(activeId);
      renderChatWindow(conversations[activeId].messages);
    }

    renderSidebar();
  }

  function renderSidebar() {
    const conversations = loadConversations();
    const ids = Object.keys(conversations);

    ids.sort(function(a, b) {
      return conversations[b].updatedAt - conversations[a].updatedAt;
    });

    conversationList.innerHTML = '';

    ids.forEach(function(id) {
      const conv = conversations[id];
      const item = document.createElement('div');
      item.className = 'conversation-item' + (id === activeId ? ' active' : '');

      const titleSpan = document.createElement('span');
      titleSpan.className = 'conversation-title';
      titleSpan.textContent = conv.title;

      item.appendChild(titleSpan);

      const actions = document.createElement('div');
      actions.className = 'conv-actions';

      const editBtn = document.createElement('button');
      editBtn.type = 'button';
      editBtn.className = 'conv-action-btn';
      editBtn.setAttribute('aria-label', 'Rename conversation');
      editBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>';

      const deleteBtn = document.createElement('button');
      deleteBtn.type = 'button';
      deleteBtn.className = 'conv-action-btn';
      deleteBtn.setAttribute('aria-label', 'Delete conversation');
      deleteBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path></svg>';

      actions.appendChild(editBtn);
      actions.appendChild(deleteBtn);
      item.appendChild(actions);

      item.addEventListener('click', function() {
        switchToConversation(id);
      });

      editBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        startInlineRename(item, titleSpan, id, conv.title);
      });

      deleteBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        deleteConversation(id);
      });

      conversationList.appendChild(item);
    });
  }

  function startInlineRename(item, titleSpan, id, currentTitle) {
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'conversation-title-input';
    input.value = currentTitle;

    item.replaceChild(input, titleSpan);
    input.focus();
    input.select();

    function commit() {
      renameConversation(id, input.value);
    }

    input.addEventListener('click', function(e) {
      e.stopPropagation();
    });

    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        commit();
      } else if (e.key === 'Escape') {
        e.preventDefault();
        renderSidebar();
      }
    });

    input.addEventListener('blur', commit);
  }

  function addThinkingBubble() {
    const row = document.createElement('div');
    row.className = 'message-row ai';
    row.id = 'thinking-row';

    const bubble = document.createElement('div');
    bubble.className = 'bubble thinking';
    bubble.innerHTML = 'TenAI is thinking<span class="dot"></span><span class="dot"></span><span class="dot"></span>';

    row.appendChild(bubble);
    chatWindow.appendChild(row);
    scrollToBottom();
  }

  function removeThinkingBubble() {
    const row = document.getElementById('thinking-row');
    if (row) row.remove();
  }

  function autoResize() {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
  }

  function updateSendBtnState() {
    if (input.value.trim().length > 0 && !isWaiting) {
      sendBtn.classList.add('active');
    } else {
      sendBtn.classList.remove('active');
    }
  }

  // ---------- Sidebar open/close (mobile) ----------

  function openSidebar() {
    sidebar.classList.add('open');
    sidebarBackdrop.classList.add('open');
  }

  function closeSidebar() {
    sidebar.classList.remove('open');
    sidebarBackdrop.classList.remove('open');
  }

  function closeSidebarOnMobile() {
    if (window.innerWidth < 768) {
      closeSidebar();
    }
  }

  menuBtn.addEventListener('click', function() {
    if (sidebar.classList.contains('open')) {
      closeSidebar();
    } else {
      openSidebar();
    }
  });

  sidebarBackdrop.addEventListener('click', closeSidebar);

  // ---------- Sending messages (streaming) ----------

  input.addEventListener('input', function() {
    autoResize();
    updateSendBtnState();
  });

  async function sendMessage() {
    const text = input.value.trim();
    if (!text || isWaiting) return;

    addMessage(text, 'user');
    input.value = '';
    autoResize();

    isWaiting = true;
    sendBtn.disabled = true;
    updateSendBtnState();
    addThinkingBubble();

    let aiBubble = null;
    let accumulated = '';

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ message: text, messages: buildMessagesForApi() })
      });

      if (!response.ok || !response.body) {
        throw new Error('Request failed with status ' + response.status);
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          const trimmed = line.trim();
          if (!trimmed.startsWith('data:')) continue;

          const dataStr = trimmed.slice(5).trim();
          if (dataStr === '[DONE]' || dataStr === '') continue;

          try {
            const parsed = JSON.parse(dataStr);
            const delta = parsed.choices?.[0]?.delta?.content;
            if (delta) {
              if (!aiBubble) {
                removeThinkingBubble();
                aiBubble = addMessage('', 'ai', true);
              }
              accumulated += delta;
              aiBubble.textContent = accumulated;
              scrollToBottom();
            }
          } catch (e) {
            // ignore incomplete/malformed JSON fragments
          }
        }
      }

      removeThinkingBubble();

      if (!accumulated) {
        accumulated = '(No reply received)';
        addMessage(accumulated, 'ai', true);
      }

      persistMessage(accumulated, 'ai');

    } catch (err) {
      removeThinkingBubble();
      addMessage('Error: could not reach TenAI. Please try again.', 'ai');
    } finally {
      isWaiting = false;
      sendBtn.disabled = false;
      updateSendBtnState();
      input.focus();
    }
  }

  sendBtn.addEventListener('click', sendMessage);

  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  newChatBtn.addEventListener('click', startNewConversation);

  initConversations();
  updateSendBtnState();
  input.focus();
</script>

</body>
</html>
