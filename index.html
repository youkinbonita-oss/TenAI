<!DOCTYPE html>
<html>
<head>
  <title>TenAI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{
      margin:0;
      background:#111827;
      color:white;
      font-family:Arial,sans-serif;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      text-align:center;
    }
    h1{
      color:#00d4ff;
      font-size:48px;
    }
    p{
      font-size:20px;
    }
    button{
      padding:15px 30px;
      border:none;
      border-radius:8px;
      background:#00d4ff;
      color:black;
      font-size:18px;
      cursor:pointer;
    }
  </style>
</head>
<body>
<div>
<h1>TenAI</h1>
<p>Welcome to your AI assistant.</p>
<button>Start Chat</button>
</div>
</body>
</html>
<script>
const button = document.querySelector("button");

button.addEventListener("click", async () => {
  const message = prompt("Ask TenAI anything:");

  if (!message) return;

  const response = await fetch("/api/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message })
  });

  const data = await response.json();

  alert(data.reply);
});
</script>
